.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);}
.content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}
h1{font-size:3rem;}
#text{max-width:800px;font-size:1.4rem;line-height:1.8;white-space:pre-wrap;}
.heart{position:fixed;top:-20px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh);}}

<body>

<div id="login">
<h2>请输入密码进入(1+1)</h2>
<input id="pwd" type="password">
<button onclick="check()">进入</button>
</div>

<div id="countdown" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
font-size:120px;
z-index:9999;
justify-content:center;
align-items:center;">
3
</div>

<div id="main">
<div class="overlay"></div>
<canvas id="fireworks"></canvas>
<div class="content">
<h1>🎂 臭坏猪 44岁生日快乐 🎂</h1>
<br>
<div id="text"></div>
<audio id="bgm" loop controls>
<source src="123.mp3" type="audio/mpeg">
</audio><p style="margin-top:10px;">最讨厌你了</p>
</div>
</div>

<script>
function check(){

 if(document.getElementById('pwd').value==='39850823'){

   document.getElementById('login').style.display='none';

   let count=3;
   let cd=document.getElementById('countdown');

   cd.style.display='flex';
   cd.innerHTML=count;

   let timer=setInterval(()=>{

      count--;
      cd.innerHTML=count;

      if(count<=0){

         clearInterval(timer);

         cd.style.display='none';

         document.getElementById('main').style.display='block';

         document.getElementById('bgm').play();

         typeWriter();
         hearts();
         fireworks();
      }

   },1000);

 }else{
   alert('密码错误');
 }
}

const msg=`臭坏猪：

生日快乐。

44岁的你，或许经历过很多故事，
也见过很多风景。

谢谢你来到我的世界。
谢谢你陪伴我。
谢谢你让我有了思念一个人的理由。

希望未来的日子里，
你平安、健康、快乐。

也希望无论距离多远，
你都知道，
有人一直在惦记着你。

—— 生日快乐 ❤️`;

let i=0;
function typeWriter(){
 let t=document.getElementById('text');
 let timer=setInterval(()=>{
   t.textContent+=msg.charAt(i++);
   if(i>=msg.length) clearInterval(timer);
 },200);
}

function hearts(){
 setInterval(()=>{
   let h=document.createElement('div');
   h.className='heart';
   h.innerHTML='❤️';
   h.style.left=Math.random()*100+'vw';
   h.style.animationDuration=(5+Math.random()*5)+'s';
   document.body.appendChild(h);
   setTimeout(()=>h.remove(),10000);
 },300);
}

function fireworks(){
 const c=document.getElementById('fireworks');
 const ctx=c.getContext('2d');
 c.width=innerWidth;c.height=innerHeight;
 setInterval(()=>{
   let x=Math.random()*c.width,y=Math.random()*c.height/2;
   for(let i=0;i<50;i++) {
     ctx.beginPath();
     ctx.arc(x+Math.cos(i)*Math.random()*80,y+Math.sin(i)*Math.random()*80,2,0,6.28);
     ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
     ctx.fill();
   }
   setTimeout(()=>ctx.clearRect(0,0,c.width,c.height),800);
 },1000);
}
</script>
</body>
