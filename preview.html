<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>生日快樂</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

/* ===== 倒數畫面 ===== */
#countdown {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 100px;
  z-index: 9999;
}

/* ===== 密碼畫面 ===== */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9998;
}

input {
  padding: 10px;
  font-size: 18px;
  margin-top: 10px;
}

/* ===== 主畫面 ===== */
#main {
  display: none;
  width: 100%;
  height: 100%;
  color: white;
  text-align: center;
  position: relative;
}

/* 煙火 */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* 內容 */
.content {
  position: relative;
  z-index: 2;
  top: 40%;
}
h1 {
  font-size: 32px;
}
</style>
</head>

<body>

<!-- 🔐 密碼 -->
<div id="lockScreen">
  <h2>輸入密碼</h2>
  <input type="password" id="pwd" placeholder="輸入密碼">
  <button onclick="checkPwd()">進入</button>
</div>

<!-- ⏳ 倒數 -->
<div id="countdown" style="display:none;">3</div>

<!-- 🎆 主畫面 -->
<div id="main">
  <canvas id="fireworks"></canvas>

  <div class="content">
    <h1>🎂 臭坏猪 44 🎂</h1>
    <p>生日快乐</p>
    <button onclick="startMusic()">點我開始</button>
  </div>
</div>

<audio id="bgm" src="music.mp3" loop></audio>

<script>
let pwdCorrect = "1234"; // 🔑 改密碼在這裡

function checkPwd() {
  let input = document.getElementById("pwd").value;
  if (input === pwdCorrect) {
    document.getElementById("lockScreen").style.display = "none";
    startCountdown();
  } else {
    alert("密碼錯誤");
  }
}

/* ===== 倒數 ===== */
function startCountdown() {
  let cd = document.getElementById("countdown");
  cd.style.display = "flex";

  let num = 3;
  cd.innerText = num;

  let timer = setInterval(() => {
    num--;
    if (num === 0) {
      clearInterval(timer);
      cd.style.display = "none";
      document.getElementById("main").style.display = "block";
      startFireworks();
    } else {
      cd.innerText = num;
    }
  }, 1000);
}

/* ===== 音樂（手機必須點擊） ===== */
function startMusic() {
  document.getElementById("bgm").play();
}

/* ===== 煙火簡易版 ===== */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework() {
  let x = Math.random() * canvas.width;
  let y = Math.random() * canvas.height / 2;

  for (let i = 0; i < 30; i++) {
    particles.push({
      x: x,
      y: y,
      dx: (Math.random() - 0.5) * 6,
      dy: (Math.random() - 0.5) * 6,
      life: 100
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.x += p.dx;
    p.y += p.dy;
    p.life--;

    ctx.fillStyle = "white";
    ctx.fillRect(p.x, p.y, 2, 2);

    if (p.life <= 0) particles.splice(i, 1);
  });

  requestAnimationFrame(animate);
}

function startFireworks() {
  animate();
  setInterval(createFirework, 800);
}

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
